<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Interest Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Simple Interest Calculator</h1>
    <p class="intro">
      This calculator helps you find the simple interest and total amount using rate and time.
    </p>

    <form id="interest-form" class="card">
      <label for="principal">Principal Amount</label>
      <input type="number" id="principal" placeholder="Enter principal" min="0" step="0.01" required>

      <label for="rate">Rate of Interest (%)</label>
      <input type="number" id="rate" placeholder="Enter rate" min="0" step="0.01" required>

      <label for="time">Time (Years)</label>
      <input type="number" id="time" placeholder="Enter time" min="0" step="0.01" required>

      <div class="buttons">
        <button type="submit">Calculate</button>
        <button type="reset" id="reset-btn">Clear</button>
      </div>
    </form>

    <section class="result card" id="result">
      <h2>Result</h2>
      <p id="interest-output">Simple Interest: 0.00</p>
      <p id="total-output">Total Amount: 0.00</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
