<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotion Detector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f6fb;
      margin: 0;
      padding: 30px 15px;
      color: #1f2933;
    }

    .wrapper {
      max-width: 720px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin-top: 0;
      color: #0b69a3;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      padding: 12px;
      border: 1px solid #bcccdc;
      border-radius: 6px;
      box-sizing: border-box;
      resize: vertical;
      font-size: 15px;
    }

    button {
      margin-top: 14px;
      background: #0b69a3;
      color: #ffffff;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    #system_response {
      margin-top: 18px;
      padding: 14px;
      background: #f8fbff;
      border-left: 4px solid #0b69a3;
      border-radius: 6px;
      min-height: 24px;
      white-space: normal;
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <h1>Emotion Detector</h1>
    <p>Enter a sentence and find the emotion expressed in the text.</p>

    <label for="textToAnalyze">Text to analyze</label>
    <textarea id="textToAnalyze" placeholder="Type your text here"></textarea>

    <button type="button" onclick="RunSentimentAnalysis()">Analyze Emotion</button>

    <div id="system_response"></div>
  </main>

  <script src="/static/mywebscript.js"></script>
</body>
</html>
